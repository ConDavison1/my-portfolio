<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connor Davison | Software Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bg-primary': '#030712',
              'bg-card': '#0f172a',
              'bg-card-hover': '#1e293b',
              'accent': '#818cf8',
              'accent-secondary': '#c084fc',
              'accent-cyan': '#22d3ee',
              'text-primary': '#f8fafc',
              'text-secondary': '#94a3b8',
              'text-muted': '#64748b',
              'border-subtle': 'rgba(148, 163, 184, 0.08)',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <style>
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        background-color: #030712;
        color: #f8fafc;
        overflow-x: hidden;
      }

      /* Gradient text */
      .gradient-text {
        background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #22d3ee 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .gradient-text-subtle {
        background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Glass card */
      .glass-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(148, 163, 184, 0.08);
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .glass-card:hover {
        background: rgba(30, 41, 59, 0.6);
        border-color: rgba(129, 140, 248, 0.15);
        transform: translateY(-4px);
        box-shadow:
          0 20px 40px -12px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(129, 140, 248, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      /* Glow button */
      .btn-glow {
        position: relative;
        background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
        transition: all 0.3s ease;
      }
      .btn-glow::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        background: linear-gradient(135deg, #818cf8, #c084fc);
        filter: blur(12px);
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: -1;
      }
      .btn-glow:hover::before {
        opacity: 0.6;
      }
      .btn-glow:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(129, 140, 248, 0.3);
      }

      /* Gradient border card */
      .gradient-border {
        position: relative;
        background: rgba(15, 23, 42, 0.8);
        border-radius: 1rem;
        overflow: hidden;
      }
      .gradient-border::before {
        content: '';
        position: absolute;
        inset: 0;
        padding: 1px;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(129, 140, 248, 0.2), rgba(192, 132, 252, 0.1), transparent);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      /* Animated gradient orbs */
      @keyframes float-slow {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(30px, -50px) scale(1.1); }
        50% { transform: translate(-20px, -100px) scale(0.9); }
        75% { transform: translate(50px, -30px) scale(1.05); }
      }
      @keyframes float-slow-reverse {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(-40px, 30px) scale(1.1); }
        50% { transform: translate(30px, 60px) scale(0.95); }
        75% { transform: translate(-20px, 40px) scale(1.05); }
      }

      /* Section divider gradient line */
      .section-divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(129, 140, 248, 0.15), rgba(192, 132, 252, 0.15), transparent);
      }

      /* Smooth scroll reveal */
      @keyframes reveal-up {
        from {
          opacity: 0;
          filter: blur(10px);
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          filter: blur(0);
          transform: translateY(0);
        }
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #030712;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }

      /* Skill badge hover */
      .skill-badge {
        transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .skill-badge:hover {
        background: rgba(129, 140, 248, 0.1);
        border-color: rgba(129, 140, 248, 0.3);
        color: #c7d2fe;
        transform: translateY(-2px);
      }

      /* Timeline dot pulse */
      @keyframes pulse-ring {
        0% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0.4); }
        70% { box-shadow: 0 0 0 8px rgba(129, 140, 248, 0); }
        100% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0); }
      }
      .timeline-dot {
        animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      /* Card shine effect on hover */
      .card-shine {
        position: relative;
        overflow: hidden;
      }
      .card-shine::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          105deg,
          transparent 40%,
          rgba(255, 255, 255, 0.03) 45%,
          rgba(255, 255, 255, 0.05) 50%,
          rgba(255, 255, 255, 0.03) 55%,
          transparent 60%
        );
        transform: translateX(-100%);
        transition: transform 0.6s ease;
        pointer-events: none;
      }
      .card-shine:hover::after {
        transform: translateX(100%);
      }
    </style>
  <script type="module" crossorigin src="/assets/index-ChREm1GG.js"></script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
